<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Yandihan Kasir</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --primary: #0f172a;
      --accent: #3b82f6;
      --accent-hover: #2563eb;
      --bg-gradient: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
      --card-bg: rgba(255, 255, 255, 0.08);
      --card-border: rgba(255, 255, 255, 0.12);
      --text: #f8fafc;
      --text-muted: #94a3b8;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: 'Outfit', sans-serif;
    }

    body {
      background: var(--bg-gradient);
      color: var(--text);
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      padding: 1.5rem;
      overflow: hidden;
    }

    .container {
      width: 100%;
      max-width: 440px;
      position: relative;
    }

    .card {
      background: var(--card-bg);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border: 1px solid var(--card-border);
      border-radius: 24px;
      padding: 2.5rem 2rem;
      box-shadow: 0 20px 40px rgba(0, 0, 0, 0.3);
      text-align: center;
      animation: fadeInUp 0.6s ease-out;
    }

    .logo-container {
      width: 80px;
      height: 80px;
      background: linear-gradient(135deg, #3b82f6 0%, #8b5cf6 100%);
      border-radius: 20px;
      margin: 0 auto 1.5rem;
      display: flex;
      justify-content: center;
      align-items: center;
      box-shadow: 0 8px 16px rgba(59, 130, 246, 0.3);
      font-size: 2.5rem;
      color: white;
    }

    h1 {
      font-size: 1.75rem;
      font-weight: 700;
      margin-bottom: 0.5rem;
      background: linear-gradient(to right, #3b82f6, #8b5cf6);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    p {
      color: var(--text-muted);
      font-size: 0.95rem;
      line-height: 1.5;
      margin-bottom: 2rem;
    }

    .input-group {
      margin-bottom: 1.5rem;
      text-align: left;
    }

    label {
      display: block;
      font-size: 0.85rem;
      font-weight: 600;
      color: var(--text-muted);
      margin-bottom: 0.5rem;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    input {
      width: 100%;
      padding: 0.875rem 1.25rem;
      background: rgba(15, 23, 42, 0.6);
      border: 1px solid var(--card-border);
      border-radius: 12px;
      color: var(--text);
      font-size: 1rem;
      transition: all 0.3s ease;
      outline: none;
    }

    input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 4px rgba(59, 130, 246, 0.15);
      background: rgba(15, 23, 42, 0.8);
    }

    button {
      width: 100%;
      padding: 0.875rem;
      background: linear-gradient(135deg, #3b82f6 0%, #8b5cf6 100%);
      border: none;
      border-radius: 12px;
      color: white;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      box-shadow: 0 4px 12px rgba(59, 130, 246, 0.2);
      transition: all 0.3s ease;
    }

    button:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 20px rgba(59, 130, 246, 0.3);
    }

    button:active {
      transform: translateY(0);
    }

    .loader {
      display: none;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem 0;
    }

    .spinner {
      width: 48px;
      height: 48px;
      border: 5px solid rgba(255, 255, 255, 0.1);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 1s linear infinite;
      margin-bottom: 1rem;
    }

    .error-msg {
      color: #ef4444;
      font-size: 0.875rem;
      margin-top: 0.5rem;
      display: none;
    }

    @keyframes fadeInUp {
      from {
        opacity: 0;
        transform: translateY(20px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }
  </style>
</head>
<body>

  <div class="container">
    <!-- Form Card -->
    <div class="card" id="setupForm">
      <div class="logo-container">🛒</div>
      <h1>Yandihan Kasir</h1>
      <p>Masukkan link kasir yang diperoleh dari menu Pengaturan Kasir di dashboard Anda.</p>
      
      <div class="input-group">
        <label for="cashierUrl">Link Web Kasir</label>
        <input type="url" id="cashierUrl" placeholder="https://yandihan-app.vercel.app/c/token..." autocomplete="off">
        <div class="error-msg" id="errorMsg">Link kasir tidak valid! Harus berawalan http:// atau https://</div>
      </div>
      
      <button onclick="saveAndRedirect()">Simpan & Hubungkan</button>
    </div>

    <!-- Redirecting Loader -->
    <div class="card loader" id="redirectingLoader">
      <div class="spinner"></div>
      <h2>Menghubungkan...</h2>
      <p style="margin-bottom: 0;">Membuka halaman kasir Anda secara aman.</p>
    </div>
  </div>

  <script>
    // Handle Reset action from remote origin redirect
    const urlParams = new URLSearchParams(window.location.search);
    if (urlParams.has('reset')) {
      localStorage.removeItem('cashier_link');
      // Clean query params so refresh doesn't trigger reset again
      window.history.replaceState({}, document.title, window.location.pathname);
    }

    const savedLink = localStorage.getItem('cashier_link');
    
    if (savedLink) {
      document.getElementById('setupForm').style.display = 'none';
      document.getElementById('redirectingLoader').style.display = 'flex';
      setTimeout(() => {
        window.location.replace(savedLink);
      }, 800);
    }

    function saveAndRedirect() {
      const urlInput = document.getElementById('cashierUrl');
      const errorMsg = document.getElementById('errorMsg');
      let link = urlInput.value.trim();

      // Simple URL validation
      if (!link.startsWith('http://') && !link.startsWith('https://')) {
        errorMsg.style.display = 'block';
        urlInput.style.borderColor = '#ef4444';
        return;
      }

      errorMsg.style.display = 'none';
      urlInput.style.borderColor = 'var(--card-border)';

      localStorage.setItem('cashier_link', link);
      
      document.getElementById('setupForm').style.display = 'none';
      document.getElementById('redirectingLoader').style.display = 'flex';
      
      setTimeout(() => {
        window.location.replace(link);
      }, 1000);
    }
  </script>
</body>
</html>
